{% extends 'base.html' %}

{% block title %}אישור מנוי — Communication LTD{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-box-seam me-2"></i>אישור הרשמה לחבילה</h5>
            </div>
            <div class="card-body text-center py-5">
                <i class="bi bi-person-check display-3 text-success mb-3 d-block"></i>
                <h4>הרשמת <strong>{{ customer.name }}</strong></h4>
                <p class="text-muted">לחבילה <strong>{{ package.name }}</strong> במחיר ₪{{ package.price }}/חודש</p>
                <hr>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-3 justify-content-center">
                        <button type="submit" class="btn btn-success btn-lg">
                            <i class="bi bi-check-circle me-2"></i>אשר הרשמה
                        </button>
                        <a href="{% url 'system_screen' %}" class="btn btn-outline-secondary btn-lg">
                            <i class="bi bi-x-circle me-2"></i>ביטול
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
